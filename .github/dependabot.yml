version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /examples/ai-code-exec
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - go
      - examples

  - package-ecosystem: gomod
    directory: /examples/ci-sandbox
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - go
      - examples

  - package-ecosystem: gomod
    directory: /examples/sec-research
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - go
      - examples

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      actions:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
