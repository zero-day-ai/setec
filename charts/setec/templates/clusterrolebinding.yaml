apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "setec.fullname" . }}-manager
  labels:
    {{- include "setec.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "setec.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "setec.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
